# CanaBoom — unabhängiger Render-Service (FINIX.AI)

services:
  - type: web
    name: canaboom
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_NAME
        value: CanaBoom
      - key: AI_PROVIDER
        value: local
      - key: AI_MODEL
        value: llama3.2
      - key: BASE_URL
        sync: false
